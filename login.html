<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login &middot; MG Ballpark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/theme.js"></script>
</head>
<body>
  <main class="container login-wrap">
    <div class="topbar">
      <button class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
    </div>
    <header class="page-header">
      <h1>🔒 Admin Login</h1>
      <p class="subtitle">Sign in to manage rates, services and packages.</p>
    </header>

    <section class="options-panel">
      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" class="text-input" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="text-input" autocomplete="current-password" required />
        </div>
        <div id="loginError" class="error-banner" role="alert" hidden></div>
        <div class="field field-action">
          <button type="submit" id="loginBtn" class="btn btn-primary btn-large">Sign in</button>
        </div>
      </form>
      <p class="muted"><a href="index.html">← Back to calculator</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
